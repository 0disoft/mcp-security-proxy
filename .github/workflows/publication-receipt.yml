name: Publication Receipt

on:
  workflow_run:
    workflows:
      - Registry Smoke
    types:
      - completed

permissions:
  actions: read
  contents: read

concurrency:
  group: publication-receipt-${{ github.event.workflow_run.id }}
  cancel-in-progress: false

jobs:
  receipt:
    name: publication-receipt
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        # actions/checkout v7.0.0
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Setup Node.js
        # actions/setup-node v6.4.0
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 24.11.1

      - name: Generate verified publication receipt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MSP_PUBLICATION_RECEIPT_REQUEST: ${{ github.event.workflow_run.display_title }}
          MSP_REGISTRY_SMOKE_RUN_ID: ${{ github.event.workflow_run.id }}
          MSP_PUBLICATION_RECEIPT_OUTPUT_DIR: publication-receipt
        run: node scripts/generate-publication-receipt.mjs

      - name: Upload publication receipt
        # actions/upload-artifact v4.6.2
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: publication-receipt-${{ github.event.workflow_run.id }}
          path: publication-receipt/*.publication.json
          if-no-files-found: error
          retention-days: 30
