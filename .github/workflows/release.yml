name: Release

on:
  push:
    tags:
      - 'v[0-9]*.[0-9]*.[0-9]*'

permissions:
  contents: read
  id-token: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: publish
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: npm

    steps:
      - name: Checkout
        # actions/checkout v7.0.0
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          fetch-depth: 0

      - name: Setup Node.js
        # actions/setup-node v6.4.0
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 24.11.1
          registry-url: https://registry.npmjs.org

      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@11.7.0 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run repository check
        run: pnpm run check

      - name: Verify release publish plan
        run: node scripts/check-release-publish-plan.mjs

      - name: Verify pinned external MCP fixture
        run: pnpm run external-compatibility

      - name: Publish contracts package
        run: pnpm --filter @0disoft/mcp-security-proxy-contracts publish --access public --provenance --no-git-checks

      - name: Publish core package
        run: pnpm --filter @0disoft/mcp-security-proxy-core publish --access public --provenance --no-git-checks

      - name: Publish MCP adapter package
        run: pnpm --filter @0disoft/mcp-security-proxy-mcp-adapter publish --access public --provenance --no-git-checks

      - name: Publish runtime package
        run: pnpm --filter @0disoft/mcp-security-proxy-runtime publish --access public --provenance --no-git-checks

      - name: Publish CLI package
        run: pnpm --filter @0disoft/mcp-security-proxy-cli publish --access public --provenance --no-git-checks

      - name: Verify published registry packages
        run: pnpm run registry-smoke
